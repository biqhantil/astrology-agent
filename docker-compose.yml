# ── Astrology Agent — Production Docker Compose ─────────────────────────────
# Two services: FastAPI backend + nginx (reverse proxy + static frontend + auth)

services:

  # ── Backend (FastAPI + uvicorn) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
      SQLITE_PATH: /data/astrology.db
    volumes:
      - astro_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── nginx (reverse proxy + static files) ──────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-bix}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-changeme}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  astro_data:
